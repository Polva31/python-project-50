name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install setuptools wheel
        pip install -e .
    - name: List installed packages
      run: pip list
    - name: Check package structure
      run: |
        ls -la
        ls -la gendiff/ || echo "gendiff directory not found"
        python -c "import sys; print('PYTHONPATH:', sys.path)"
    - name: Verify import
      run: python -c "from gendiff import generate_diff; print('SUCCESS: gendiff imported correctly')"
    - name: Lint with Ruff
      run: |
        pip install ruff
        ruff check .
    - name: Test with pytest and coverage
      run: |
        pip install pytest pytest-cov
        pytest --cov=gendiff --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
